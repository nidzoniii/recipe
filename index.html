<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Recipes</title>
  <style>
    :root {
      --bg: #f2f2f0;
      --card: #ffffff;
      --accent: #4a7c59;
      --accent-light: #eaf2ec;
      --text: #1a1a1a;
      --muted: #8e8e93;
      --border: #e5e5ea;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding-top: calc(var(--safe-top) + 12px);
      padding-bottom: 12px;
      padding-left: 16px;
      padding-right: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      display: none;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      font-size: 1.7rem;
      line-height: 1;
      cursor: pointer;
      color: var(--accent);
      padding: 0;
      margin-right: 2px;
      flex-shrink: 0;
    }
    .back-btn.visible { display: flex; }

    .header-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* ── Home ── */
    #home-view { padding: 16px; }

    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recipe-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: opacity 0.12s;
    }
    .recipe-card:active { opacity: 0.55; }

    .recipe-emoji { font-size: 2rem; width: 44px; text-align: center; flex-shrink: 0; }

    .recipe-info { flex: 1; min-width: 0; }
    .recipe-name { font-size: 1rem; font-weight: 500; }
    .recipe-base { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .recipe-chevron { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; }

    /* ── Detail ── */
    #detail-view { display: none; padding: 16px; }
    #detail-view.active { display: block; }

    /* Serving selector */
    .serving-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 18px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .serving-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 2px; }
    .serving-value { font-size: 1.25rem; font-weight: 600; }

    .stepper {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stepper-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
      font-weight: 300;
    }
    .stepper-btn:active { background: #c8dece; }
    .stepper-btn:disabled {
      background: var(--bg);
      color: var(--border);
      cursor: default;
    }

    .stepper-num {
      font-size: 1.3rem;
      font-weight: 600;
      width: 28px;
      text-align: center;
      color: var(--accent);
    }

    /* Sections */
    .section {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      background: #fafaf8;
    }

    .ing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      min-height: 44px;
    }
    .ing-row:last-child { border-bottom: none; }

    .ing-name {
      font-size: 0.93rem;
      flex: 1;
      line-height: 1.3;
    }

    .ing-amount {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      text-align: right;
      flex-shrink: 0;
      max-width: 48%;
    }
    .ing-amount.taste {
      color: var(--muted);
      font-weight: 400;
      font-style: italic;
    }

    /* raw row spans full width */
    .ing-row.raw-row .ing-name { flex: 1; font-size: 0.93rem; }

    /* bottom safe area */
    .safe-bottom { height: calc(var(--safe-bottom) + 24px); }
  </style>
</head>

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (Math.abs(n - Math.round(n)) < 0.001) return String(Math.round(n));
  if (n < 1)  return String(parseFloat(n.toFixed(2)));
  if (n < 10) return String(parseFloat(n.toFixed(1)));
  // round to nearest 0.5 for larger values
  const r = Math.round(n * 2) / 2;
  return r % 1 === 0 ? String(r) : r.toFixed(1);
}

const WORD_UNITS = new Set(['tsp', 'tbsp', 'dl', 'L']);

function formatAmount(ing, factor) {
  if (ing.amountMin !== undefined) {
    return `${fmt(ing.amountMin * factor)}–${fmt(ing.amountMax * factor)} ${ing.unit}`.trim();
  }
  const sep = ing.unit && !WORD_UNITS.has(ing.unit) ? '' : ' ';
  return `${fmt(ing.amount * factor)}${sep}${ing.unit}`.trim();
}

function buildIngRow(ing, factor) {
  const row = document.createElement('div');
  row.className = 'ing-row';

  if (ing.taste) {
    row.innerHTML = `<span class="ing-name">${ing.name}</span><span class="ing-amount taste">to taste</span>`;
    return row;
  }

  if (ing.raw) {
    row.classList.add('raw-row');
    const scaled = ing.raw.replace(/\d+(?:\.\d+)?/g, m => fmt(parseFloat(m) * factor));
    row.innerHTML = `<span class="ing-name">${scaled}</span>`;
    return row;
  }

  row.innerHTML = `<span class="ing-name">${ing.name}</span><span class="ing-amount">${formatAmount(ing, factor)}</span>`;
  return row;
}

const stepperNum    = document.getElementById('stepper-num');
const btnMinus      = document.getElementById('btn-minus');
const btnPlus       = document.getElementById('btn-plus');
const ingredientList= document.getElementById('ingredient-list');
const recipeList    = document.getElementById('recipe-list');

// ── Render ───────────────────────────────────────────────────────────────────
function renderIngredients() {
  const factor = servings / currentRecipe.baseServings;
  ingredientList.innerHTML = '';

  currentRecipe.sections.forEach(sec => {
    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.innerHTML = `<div class="section-title">${sec.name}</div>`;
    sec.ingredients.forEach(ing => wrap.appendChild(buildIngRow(ing, factor)));
    ingredientList.appendChild(wrap);
  });

  const label = servings === 1 ? '1 person' : `${servings} people`;
  servingDisp.textContent = label;
  stepperNum.textContent  = servings;
  btnMinus.disabled = servings <= 1;
  btnPlus.disabled  = servings >= 10;
}

function showHome() {
  detailView.classList.remove('active');
  homeView.style.display = '';
  backBtn.classList.remove('visible');
  headerTitle.textContent = 'My Recipes';
  window.scrollTo(0, 0);
}

function showRecipe(recipe) {
  currentRecipe = recipe;
  servings = recipe.baseServings;
  homeView.style.display = 'none';
  detailView.classList.add('active');
  backBtn.classList.add('visible');
  headerTitle.textContent = recipe.name;
  renderIngredients();
  window.scrollTo(0, 0);
}

    <span class="recipe-emoji">${recipe.emoji}</span>
    <div class="recipe-info">
      <div class="recipe-name">${recipe.name}</div>
      <div class="recipe-base">Base recipe: ${recipe.baseServings} people</div>
    </div>
    <span class="recipe-chevron">›</span>
  `;
  card.addEventListener('click', () => showRecipe(recipe));
  recipeList.appendChild(card);
});

// ── Controls ─────────────────────────────────────────────────────────────────
backBtn.addEventListener('click', showHome);

btnMinus.addEventListener('click', () => {
  if (servings > 1) { servings--; renderIngredients(); }
});
btnPlus.addEventListener('click', () => {
  if (servings < 10) { servings++; renderIngredients(); }
});
</script>
</body>
</html>
